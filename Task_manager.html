<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מנהל משימות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;700;900&display=swap" rel="stylesheet" />
  <style>
    /* ===== משתני עיצוב ===== */
    :root {
      --bg: #0d0f1a;
      --surface: #151825;
      --surface2: #1e2235;
      --border: #2a2f48;
      --text: #e8eaf6;
      --text-muted: #7880a0;
      --accent: #6c63ff;
      --accent-glow: rgba(108,99,255,0.25);
      --radius: 14px;
      --transition: 0.25s cubic-bezier(0.4,0,0.2,1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Heebo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      background-image:
        radial-gradient(ellipse 80% 50% at 20% -10%, rgba(108,99,255,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 110%, rgba(96,165,250,0.08) 0%, transparent 60%);
    }

    /* ── כותרת ── */
    header {
      padding: 32px 40px 0;
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 16px;
    }
    .header-title h1 {
      font-size: 2rem; font-weight: 900; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .header-title p { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; }

    /* תיבת ניקוד כולל */
    .total-score-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 14px 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .total-score-box::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, var(--accent-glow), transparent); pointer-events: none;
    }
    .total-score-box .label { font-size: 0.75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .total-score-box .score { font-size: 2.4rem; font-weight: 900; color: var(--accent); line-height: 1; margin-top: 2px; }
    .total-score-box .pts   { font-size: 0.8rem; color: var(--text-muted); }

    /* ── סרגל כלים ── */
    .toolbar { padding: 24px 40px 16px; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
    .btn-add {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent); color: #fff; border: none; border-radius: 10px;
      padding: 12px 22px; font-family: 'Heebo', sans-serif; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: var(--transition); box-shadow: 0 4px 20px rgba(108,99,255,0.4);
    }
    .btn-add:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(108,99,255,0.55); }
    .btn-add:active { transform: translateY(0); }
    .sort-label { margin-right: auto; color: var(--text-muted); font-size: 0.82rem; }

    /* ── רשת כרטיסים ── */
    .tasks-grid {
      padding: 8px 40px 60px;
      display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px;
    }

    /* ── כרטיס משימה ── */
    .task-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden; position: relative;
      transition: var(--transition); animation: slideIn 0.35s cubic-bezier(0.22,1,0.36,1) both;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .task-card:hover { transform: translateY(-4px); border-color: #3a4060; box-shadow: 0 12px 40px rgba(0,0,0,0.4); }

    /* פס צבע עליון לפי זמן יומי */
    .time-bar { height: 4px; width: 100%; }
    .task-card[data-tier="low"]    .time-bar { background: #34d399; }
    .task-card[data-tier="medium"] .time-bar { background: #60a5fa; }
    .task-card[data-tier="high"]   .time-bar { background: #f59e0b; }
    .task-card[data-tier="heavy"]  .time-bar { background: #f87171; }

    /* תג דירוג */
    .rank-badge {
      position: absolute; top: 12px; left: 12px;
      width: 32px; height: 32px; border-radius: 50%;
      background: var(--surface2); border: 1.5px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 800; color: var(--text-muted); z-index: 2;
    }
    .rank-badge.rank-1 { background: rgba(251,191,36,0.15); border-color: #fbbf24; color: #fbbf24; }
    .rank-badge.rank-2 { background: rgba(148,163,184,0.12); border-color: #94a3b8; color: #94a3b8; }
    .rank-badge.rank-3 { background: rgba(180,120,60,0.15);  border-color: #b47c3c; color: #b47c3c; }

    .task-card-body { padding: 20px 20px 20px 52px; }
    .task-name { font-size: 1.05rem; font-weight: 700; margin-bottom: 10px; line-height: 1.35; }

    /* תגית זמן יומי */
    .time-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 0.75rem; font-weight: 600; border-radius: 20px; padding: 3px 10px; margin-bottom: 12px;
    }
    .task-card[data-tier="low"]    .time-badge { background: rgba(52,211,153,0.15);  color: #34d399; }
    .task-card[data-tier="medium"] .time-badge { background: rgba(96,165,250,0.15);  color: #60a5fa; }
    .task-card[data-tier="high"]   .time-badge { background: rgba(245,158,11,0.15);  color: #f59e0b; }
    .task-card[data-tier="heavy"]  .time-badge { background: rgba(248,113,113,0.15); color: #f87171; }

    .task-meta { display: flex; flex-direction: column; gap: 6px; font-size: 0.82rem; color: var(--text-muted); }
    .task-meta .row { display: flex; align-items: flex-start; gap: 7px; }

    .priority-score { font-size: 0.75rem; color: var(--text-muted); margin-top: 8px; }
    .priority-score span { color: var(--accent); font-weight: 700; }

    /* footer */
    .task-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px; background: var(--surface2); border-top: 1px solid var(--border);
    }
    .task-mins { font-size: 1rem; font-weight: 800; color: var(--accent); }

    .task-actions { display: flex; gap: 6px; }
    .btn-icon {
      background: transparent; border: 1px solid var(--border); border-radius: 8px;
      color: var(--text-muted); width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; font-size: 0.9rem; transition: var(--transition);
    }
    .btn-icon:hover         { background: var(--surface); color: var(--text); border-color: #3a4060; }
    .btn-icon.delete:hover  { color: #f87171; border-color: #f87171; background: rgba(248,113,113,0.08); }
    .btn-icon.edit:hover    { color: var(--accent); border-color: var(--accent); background: var(--accent-glow); }

    /* מצב ריק */
    .empty-state { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--text-muted); }
    .empty-state .big-icon { font-size: 3.5rem; display: block; margin-bottom: 16px; }
    .empty-state h2 { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; color: var(--text); }

    /* ── מודל ── */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none; transition: opacity 0.25s ease;
    }
    .modal-overlay.open { opacity: 1; pointer-events: all; }
    .modal {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 18px; padding: 32px; width: 480px;
      max-width: calc(100vw - 40px); max-height: calc(100vh - 60px); overflow-y: auto;
      transform: translateY(30px) scale(0.97);
      transition: transform 0.3s cubic-bezier(0.22,1,0.36,1);
      box-shadow: 0 24px 80px rgba(0,0,0,0.6);
    }
    .modal-overlay.open .modal { transform: translateY(0) scale(1); }
    .modal h2 { font-size: 1.3rem; font-weight: 800; margin-bottom: 24px; }

    .form-group { margin-bottom: 18px; }
    .form-group label {
      display: block; font-size: 0.82rem; font-weight: 600; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 7px;
    }
    .form-group input,
    .form-group textarea,
    .form-group select {
      width: 100%; background: var(--surface2); border: 1px solid var(--border);
      border-radius: 10px; color: var(--text); font-family: 'Heebo', sans-serif;
      font-size: 0.95rem; padding: 11px 14px; outline: none; transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group textarea:focus,
    .form-group select:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
    .form-group textarea { resize: vertical; min-height: 80px; }

    /* שדה זמן יומי */
    .time-row { display: flex; gap: 10px; }
    .time-row input  { flex: 1; }
    .time-row select { width: 120px; flex-shrink: 0; }

    .modal-actions { display: flex; gap: 10px; margin-top: 24px; justify-content: flex-end; }
    .btn-cancel {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
      color: var(--text-muted); font-family: 'Heebo', sans-serif; font-size: 0.9rem;
      padding: 10px 20px; cursor: pointer; transition: var(--transition);
    }
    .btn-cancel:hover { color: var(--text); background: var(--surface); }
    .btn-save {
      background: var(--accent); border: none; border-radius: 10px; color: #fff;
      font-family: 'Heebo', sans-serif; font-size: 0.9rem; font-weight: 700;
      padding: 10px 24px; cursor: pointer; transition: var(--transition);
      box-shadow: 0 4px 16px rgba(108,99,255,0.4);
    }
    .btn-save:hover { transform: translateY(-1px); box-shadow: 0 6px 22px rgba(108,99,255,0.55); }

    /* אנימציית מחיקה */
    .task-card.removing { animation: remove 0.3s ease forwards; }
    @keyframes remove { to { opacity: 0; transform: scale(0.9) translateY(-10px); } }

    @media (max-width: 600px) {
      header, .toolbar, .tasks-grid { padding-left: 20px; padding-right: 20px; }
      .tasks-grid { grid-template-columns: 1fr; }
    }

    /* ── לוגו ── */
    .header-logo {
      height: 52px;
      width: auto;
      object-fit: contain;
      filter: drop-shadow(0 0 8px rgba(255,60,60,0.5));
      margin-left: 14px;
      flex-shrink: 0;
    }
    .header-title { display: flex; align-items: center; }
    .header-title-text h1 { font-size: 2rem; font-weight: 900; letter-spacing: -0.03em;
      background: linear-gradient(135deg, #fff 30%, var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .header-title-text p { color: var(--text-muted); font-size: 0.9rem; margin-top: 2px; }
  </style>
</head>

<!-- ── סרגל כלים ── -->
<div class="toolbar">
  <button class="btn-add" onclick="openModal()">
    <span>＋</span> הוסף משימה
  </button>
  <button id="notifBtn" style="
    display:inline-flex;align-items:center;gap:8px;
    background:var(--surface2);border:1px solid var(--border);border-radius:10px;
    color:var(--text-muted);font-family:'Heebo',sans-serif;font-size:0.88rem;
    padding:11px 18px;cursor:pointer;transition:var(--transition);
  ">🔔 הפעל תזכורת 12:00</button>
  <span class="sort-label">🤖 ממוין אוטומטית: זמן יומי רב → מעט</span>
</div>

<!-- ── רשת משימות ── -->
<div class="tasks-grid" id="tasksGrid"></div>

<!-- ── מודל הוספה/עריכה ── -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <h2 id="modalTitle">✏️ משימה חדשה</h2>

    <div class="form-group">
      <label>שם המשימה *</label>
      <input type="text" id="fieldName" placeholder="לדוגמה: כתיבת דוח שבועי" />
    </div>

    <div class="form-group">
      <label>⏱️ כמה זמן אתה מקדיש ביום?</label>
      <div class="time-row">
        <input type="number" id="fieldTimeVal" min="1" max="999" placeholder="כמות" />
        <select id="fieldTimeUnit">
          <option value="minutes">דקות</option>
          <option value="hours" selected>שעות</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>הערות</label>
      <textarea id="fieldNotes" placeholder="פרטים נוספים, קישורים, תזכורות..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">ביטול</button>
      <button class="btn-save" onclick="saveTask()">💾 שמור</button>
    </div>
  </div>
</div>

<script>
  // ===== נתונים גלובליים =====
  let tasks     = [];
  let editingId = null;

  // ===== localStorage =====
  function loadTasks() {
    try { tasks = JSON.parse(localStorage.getItem('task_mgr_v4') || '[]'); }
    catch { tasks = []; }
  }

  function saveTasks() {
    localStorage.setItem('task_mgr_v4', JSON.stringify(tasks));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
  }

  // ===== המרת זמן יומי לדקות (בסיס החישוב) =====
  function toMinutes(val, unit) {
    const n = Number(val) || 0;
    return unit === 'hours' ? n * 60 : n;
  }

  // ===== פורמט תצוגה =====
  function formatTime(val, unit) {
    if (!val) return '—';
    return unit === 'hours' ? `${val} שעות/יום` : `${val} דקות/יום`;
  }

  // ===== קביעת "טיר" צבעוני לפי דקות יומיות =====
  // עד 30 דק' → low | 30–90 → medium | 90–240 → high | מעל 240 → heavy
  function getTier(mins) {
    if (mins <= 30)  return 'low';
    if (mins <= 90)  return 'medium';
    if (mins <= 240) return 'high';
    return 'heavy';
  }

  // ===== מיון לפי זמן יומי (גבוה → נמוך) =====
  function sortedTasks() {
    return [...tasks].sort((a, b) =>
      toMinutes(b.timeVal, b.timeUnit) - toMinutes(a.timeVal, a.timeUnit)
    );
  }

  // ===== עדכון סכום כולל =====
  function updateTotal() {
    const total = tasks.reduce((s, t) => s + toMinutes(t.timeVal, t.timeUnit), 0);
    document.getElementById('totalScore').textContent = total;
  }

  // ===== רינדור כרטיסים =====
  function renderTasks() {
    const grid = document.getElementById('tasksGrid');
    grid.innerHTML = '';
    const sorted = sortedTasks();

    if (sorted.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <span class="big-icon">📋</span>
          <h2>אין עדיין משימות</h2>
          <p>לחץ על "הוסף משימה" כדי להתחיל</p>
        </div>`;
      updateTotal();
      return;
    }

    sorted.forEach((task, i) => {
      const rank      = i + 1;
      const rankClass = rank <= 3 ? `rank-${rank}` : '';
      const mins      = toMinutes(task.timeVal, task.timeUnit);
      const tier      = getTier(mins);

      const card = document.createElement('div');
      card.className       = 'task-card';
      card.dataset.id      = task.id;
      card.dataset.tier    = tier;

      const notesHtml = task.notes
        ? `<div class="row"><span>📝</span><span>${escapeHtml(task.notes)}</span></div>`
        : '';

      card.innerHTML = `
        <div class="time-bar"></div>
        <span class="rank-badge ${rankClass}">#${rank}</span>
        <div class="task-card-body">
          <div class="task-name">${escapeHtml(task.name)}</div>
          <span class="time-badge">⏱️ ${formatTime(task.timeVal, task.timeUnit)}</span>
          <div class="task-meta">
            ${notesHtml}
          </div>
        </div>
        <div class="task-footer">
          <span class="task-mins">${mins} דק׳/יום</span>
          <div class="task-actions">
            <button class="btn-icon edit"   onclick="startEdit('${task.id}')">✏️</button>
            <button class="btn-icon delete" onclick="deleteTask('${task.id}')">🗑️</button>
          </div>
        </div>
      `;

      grid.appendChild(card);
    });

    updateTotal();
  }

  // ===== פתיחת מודל הוספה =====
  function openModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '✏️ משימה חדשה';
    document.getElementById('fieldName').value        = '';
    document.getElementById('fieldTimeVal').value     = '';
    document.getElementById('fieldTimeUnit').value    = 'hours';
    document.getElementById('fieldNotes').value       = '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fieldName').focus(), 300);
  }

  // ===== פתיחת מודל עריכה =====
  function startEdit(id) {
    const task = tasks.find(t => t.id === id);
    if (!task) return;
    editingId = id;
    document.getElementById('modalTitle').textContent = '🔄 עריכת משימה';
    document.getElementById('fieldName').value        = task.name;
    document.getElementById('fieldTimeVal').value     = task.timeVal || '';
    document.getElementById('fieldTimeUnit').value    = task.timeUnit || 'hours';
    document.getElementById('fieldNotes').value       = task.notes || '';
    document.getElementById('modalOverlay').classList.add('open');
    setTimeout(() => document.getElementById('fieldName').focus(), 300);
  }

  // ===== שמירת משימה =====
  function saveTask() {
    const name = document.getElementById('fieldName').value.trim();
    if (!name) {
      document.getElementById('fieldName').style.borderColor = '#f87171';
      setTimeout(() => document.getElementById('fieldName').style.borderColor = '', 1500);
      document.getElementById('fieldName').focus();
      return;
    }
    const timeVal  = document.getElementById('fieldTimeVal').value;
    const timeUnit = document.getElementById('fieldTimeUnit').value;
    const notes    = document.getElementById('fieldNotes').value.trim();

    if (editingId) {
      const idx = tasks.findIndex(t => t.id === editingId);
      if (idx !== -1) tasks[idx] = { ...tasks[idx], name, timeVal, timeUnit, notes };
    } else {
      tasks.push({ id: uid(), name, timeVal, timeUnit, notes });
    }

    saveTasks();
    renderTasks();
    closeModal();
  }

  // ===== מחיקה עם אנימציה =====
  function deleteTask(id) {
    const card = document.querySelector(`.task-card[data-id="${id}"]`);
    if (card) {
      card.classList.add('removing');
      setTimeout(() => {
        tasks = tasks.filter(t => t.id !== id);
        saveTasks();
        renderTasks();
      }, 280);
    }
  }

  // ===== עזרים =====
  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  function escapeHtml(str) {
    return String(str)
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
      .replace(/\n/g,'<br>');
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // ===== מערכת התראות יומיות ב-12:00 =====

  // בקשת הרשאה מהמשתמש
  async function requestNotificationPermission() {
    if (!('Notification' in window)) {
      alert('הדפדפן שלך לא תומך בהתראות.');
      return false;
    }
    if (Notification.permission === 'granted') return true;
    if (Notification.permission === 'denied') return false;
    const result = await Notification.requestPermission();
    return result === 'granted';
  }

  // שליחת ההתראה עם סיכום המשימות
  function sendDailyNotification() {
    if (Notification.permission !== 'granted') return;
    const sorted = sortedTasks();
    const count  = sorted.length;
    if (count === 0) {
      new Notification('⚡ ROMOT — מנהל משימות', {
        body: 'אין לך משימות פתוחות כרגע. כל הכבוד! 🎉'
      });
      return;
    }
    const topTasks = sorted.slice(0, 3).map((t, i) =>
      '#' + (i+1) + ' ' + t.name + (t.timeVal ? ' · ' + formatDailyTime(t.timeVal, t.timeUnit) : '')
    ).join('\n');
    const extra = count > 3 ? '\n...ועוד ' + (count - 3) : '';
    new Notification('⚡ ROMOT — תזכורת יומית 12:00', {
      body: 'יש לך ' + count + ' משימות פתוחות:\n' + topTasks + extra
    });
  }

  // חישוב מילישניות עד 12:00 הקרוב
  function msUntilNoon() {
    const now  = new Date();
    const noon = new Date();
    noon.setHours(12, 0, 0, 0);
    if (now >= noon) noon.setDate(noon.getDate() + 1);
    return noon - now;
  }

  // תזמון טיימר יומי
  function scheduleDailyNotification() {
    setTimeout(function fire() {
      sendDailyNotification();
      setInterval(sendDailyNotification, 24 * 60 * 60 * 1000);
    }, msUntilNoon());
  }

  // עדכון מראה הכפתור
  function updateNotifBtn() {
    const btn = document.getElementById('notifBtn');
    if (!btn) return;
    if (Notification.permission === 'granted') {
      btn.textContent = '🔔 התראות פעילות';
      btn.style.cssText += ';background:rgba(52,211,153,0.15);border-color:#34d399;color:#34d399;';
    } else if (Notification.permission === 'denied') {
      btn.textContent = '🔕 התראות חסומות';
      btn.style.cssText += ';background:rgba(248,113,113,0.1);border-color:#f87171;color:#f87171;';
    } else {
      btn.textContent = '🔔 הפעל תזכורת 12:00';
    }
  }

  function initNotificationButton() {
    const btn = document.getElementById('notifBtn');
    if (!btn) return;
    btn.addEventListener('click', async () => {
      const granted = await requestNotificationPermission();
      if (granted) {
        scheduleDailyNotification();
        sendDailyNotification(); // תצוגה מקדימה מיידית
      }
      updateNotifBtn();
    });
    updateNotifBtn();
    if (Notification.permission === 'granted') scheduleDailyNotification();
  }

  // ===== אתחול =====
  loadTasks();
  renderTasks();
  initNotificationButton();
</script>
</body>
</html>
